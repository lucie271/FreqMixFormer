feeder: feeders.feeder_ntu.Feeder
train_feeder_args:
  data_path: /orcd/scratch/bcs/001/sensein/sails/gesture_data/3d_keypoints/prepared_fmf/mediapipe/NTU_pretrain.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 64
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False

test_feeder_args:
  data_path: /orcd/scratch/bcs/001/sensein/sails/gesture_data/3d_keypoints/prepared_fmf/mediapipe/NTU_pretrain.npz
  split: test
  window_size: 64
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False

model: model.skefreqmixformer.Model
model_args:
  num_class: 9   
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: 'spatial'

weight_decay: 0.0005
base_lr: 0.1
step: [35, 55, 75]
warm_up_epoch: 5

device: [0]
batch_size: 128
test_batch_size: 128
num_epoch: 100
nesterov: True